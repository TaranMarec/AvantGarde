<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AG+ | L'Avant-Garde</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/sytleLinktree.css">
<script src="./js/video.js" defer></script>

<body>

    <div class="linktree-container">
        <img src="https://cloud.jeunes-communistes.fr/index.php/apps/files_sharing/publicpreview/y4aDk2cEYkH9XRK?file=/AG%2B%20Noir.png&fileId=99578&x=1920&y=1200&a=true&etag=3ccbfb6020bdab36d75ac08b395ed1fc"

        <h1 class="profile-title">L'Avant-Garde</h1>
        <p class="tagline">Le journal des jeunes communistes</p>

        <h2 class="yt-section-header">NOTRE CHAÎNE YOUTUBE :</h2>
        <div class="yt-card">
            <a href="#" id="yt-link" target="_blank">
                <div class="yt-thumb-wrapper">
                    <img id="yt-thumb-img" src="" alt="Thumbnail" style="display:none;">
                    <div class="play-overlay"><i class="fab fa-youtube"></i></div>
                </div>
                <span id="yt-title">Chargement de la dernière vidéo...</span>
            </a>
        </div>

        <div class="links-wrapper">
            <p class="section-title">Nous écouter</p>
            <a href="#" class="btn-link btn-spotify">
                <i class="fab fa-spotify"></i> Podcast sur Spotify
            </a>
            <a href="#" class="btn-link btn-deezer">
                <i class="fab fa-deezer"></i> Podcast sur Deezer
            </a>

            <p class="section-title">Réseaux Sociaux</p>
            <div class="social-grid">
                <a href="https://www.tiktok.com/@lavantgarde.plus" class="social-icon"><i class="fab fa-tiktok"></i></a>
                <a href="https://www.instagram.com/avantgarde_journal/" class="social-icon"><i
                        class="fab fa-instagram"></i></a>
                <a href="https://www.facebook.com/lavantgarde.fr/" class="social-icon"><i
                        class="fab fa-facebook-f"></i></a>
                <a href="https://x.com/Journal_AG" class="social-icon"><i class="fab fa-x-twitter"></i></a>
            </div>

            <p class="section-title">Communauté</p>
            <a href="https://whatsapp.com/channel/0029VbBUkulGk1FlZDwE3v1W" class="btn-link">
                <i class="fab fa-whatsapp" style="color:#25D366;"></i> WhatsApp
            </a>
            <a href="https://t.me/lavantgardejournal" class="btn-link">
                <i class="fab fa-telegram-plane" style="color:#0088cc;"></i> Telegram
            </a>
        </div>

        <a href="./index.html" class="back-link">Retour au site principal</a>
